<svg viewBox="0 0 600 300" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="back-ribbon" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E3A8A" />
      <stop offset="30%" stop-color="#2563EB" />
      <stop offset="60%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#93C5FD" />
    </linearGradient>

    <linearGradient id="front-ribbon" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1D4ED8" />
      <stop offset="30%" stop-color="#2563EB" />
      <stop offset="60%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#7DD3FC" />
    </linearGradient>
    
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="-6" dy="6" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="600" height="300" fill="#EAEAEA" />

  <g fill="none" stroke-width="50" stroke-linecap="round">
    
    <path 
      d="M 50 150 
         A 100 100 0 0 0 150 250 
         C 300 250, 300 50, 450 50 
         A 100 100 0 0 1 550 150" 
      stroke="url(#back-ribbon)" 
    />
    
    <path 
      d="M 550 150 
         A 100 100 0 0 1 450 250 
         C 300 250, 300 50, 150 50 
         A 100 100 0 0 0 50 150" 
      stroke="url(#front-ribbon)" 
      filter="url(#drop-shadow)"
    />

  </g>
</svg>
